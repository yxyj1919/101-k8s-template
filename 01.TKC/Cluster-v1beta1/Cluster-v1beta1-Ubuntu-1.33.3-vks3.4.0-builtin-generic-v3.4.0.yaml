apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: cluster-7
  namespace: ns-1
spec:
  clusterNetwork:
    services:
      cidrBlocks: ["10.97.0.0/21"]
    pods:
      cidrBlocks: ["10.102.0.0/20"]
    serviceDomain: "cluster.local"
  topology:
    class: builtin-generic-v3.4.0
    version: v1.33.3---vmware.1-fips-vkr.1
    controlPlane:
      replicas: 1
      metadata:
        annotations:
          run.tanzu.vmware.com/resolve-os-image: os-name=ubuntu,os-version=24.04
    workers:
      machineDeployments:
        - class: node-pool
          name: az1
          replicas: 1
          metadata:
            annotations:
              run.tanzu.vmware.com/resolve-os-image: os-name=ubuntu,os-version=24.04
          variables:
            overrides:
            - name: vmClass
              value: best-effort-xsmall
    variables:
      - name: vmClass
        value: best-effort-xsmall
      - name: storageClass
        value: tanzu-cluster-1-vsan-policy
